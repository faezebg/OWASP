<!DOCTYPE html>
<html>
<head>
    <title>Password Test</title>
    <style>
        body{
            font-family: Arial;
            background:#f2f2f2;
            text-align:center;
            margin-top:100px;
        }

        .box{
            background:white;
            padding:30px;
            width:300px;
            margin:auto;
            border-radius:10px;
            box-shadow:0 0 10px rgba(0,0,0,0.2);
        }

        input{
            padding:10px;
            width:90%;
            margin-top:10px;
        }

        button{
            margin-top:15px;
            padding:10px 20px;
            background:#3498db;
            border:none;
            color:white;
            cursor:pointer;
        }
    </style>
</head>

<body>

<div class="box">
<h2>Register Password</h2>

<form method="POST" action="/save">

<input type="text" name="username" placeholder="username" required>
<br>

<input type="password" name="password" placeholder="password" required>
<br>

<button type="submit">Submit</button>

</form>
</div>

</body>
</html>
